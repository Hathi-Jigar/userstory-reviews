<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review: {{STORY_TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #E8450A;
    --brand-light: #FFF4F0;
    --bg: #F8F9FB;
    --white: #FFFFFF;
    --text: #1A1D23;
    --text-sub: #6B7280;
    --text-muted: #9CA3AF;
    --border: #E5E7EB;
    --comment-bg: #FFFBEB;
    --comment-border: #FCD34D;
    --resolved-bg: #F0FDF4;
    --resolved-border: #86EFAC;
    --highlight: rgba(252, 211, 77, 0.35);
    --highlight-hover: rgba(252, 211, 77, 0.55);
    --radius: 12px;
    --shadow: 0 4px 12px rgba(0,0,0,0.08);
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: 100vh;
  }
  .main-content { padding: 32px 48px; max-width: 900px; }
  .sidebar {
    background: var(--white);
    border-left: 1px solid var(--border);
    padding: 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  /* Top bar */
  .top-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    grid-column: 1 / -1;
  }
  .top-bar-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 14px; font-weight: 700; color: var(--brand); }
  .review-badge {
    background: var(--comment-bg);
    border: 1px solid var(--comment-border);
    color: #92400E;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .top-bar-right { display: flex; align-items: center; gap: 10px; }
  .reviewer-name {
    font-size: 13px;
    color: var(--text-sub);
  }
  .approve-btn {
    background: #16A34A;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .approve-btn:hover { background: #15803D; }
  .changes-btn {
    background: transparent;
    color: var(--brand);
    border: 1.5px solid var(--brand);
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  /* Spec content */
  .spec-content h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .spec-content h2 { font-size: 18px; font-weight: 700; margin: 28px 0 12px; color: var(--text); border-bottom: 2px solid var(--border); padding-bottom: 8px; }
  .spec-content h3 { font-size: 15px; font-weight: 700; margin: 20px 0 8px; color: var(--text); }
  .spec-content p { margin-bottom: 12px; font-size: 14px; color: var(--text); }
  .spec-content ul, .spec-content ol { margin-bottom: 12px; padding-left: 24px; }
  .spec-content li { margin-bottom: 6px; font-size: 14px; }
  .spec-content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
  .spec-content th { background: var(--bg); padding: 8px 12px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
  .spec-content td { padding: 8px 12px; border: 1px solid var(--border); }
  .spec-content blockquote { border-left: 3px solid var(--brand); padding: 8px 16px; background: var(--brand-light); margin: 12px 0; border-radius: 0 8px 8px 0; font-size: 14px; }
  .spec-content code { background: #F3F4F6; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .spec-content pre { background: #1A1D23; color: #E5E7EB; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  .spec-content pre code { background: none; color: inherit; padding: 0; }
  .spec-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .spec-content strong { font-weight: 600; }
  .spec-content input[type="checkbox"] { margin-right: 6px; }

  /* Prototype iframe */
  .prototype-section {
    margin: 24px 0;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .prototype-header {
    padding: 12px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
  }
  .prototype-header a {
    color: var(--brand);
    text-decoration: none;
    font-size: 12px;
  }
  .prototype-iframe {
    width: 100%;
    height: 700px;
    border: none;
  }

  /* Comment popup */
  .comment-popup {
    position: fixed;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    width: 320px;
    z-index: 500;
    display: none;
  }
  .comment-popup.visible { display: block; }
  .popup-header { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .popup-selected {
    background: var(--comment-bg);
    border-left: 3px solid var(--comment-border);
    padding: 6px 10px;
    font-size: 12px;
    color: #92400E;
    margin-bottom: 10px;
    border-radius: 0 6px 6px 0;
    max-height: 60px;
    overflow: hidden;
    font-style: italic;
  }
  .popup-name-input, .popup-textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: none;
    margin-bottom: 8px;
  }
  .popup-name-input:focus, .popup-textarea:focus { border-color: var(--brand); }
  .popup-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .popup-cancel {
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text-sub);
  }
  .popup-submit {
    background: var(--brand);
    border: none;
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .popup-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Highlighted text */
  .comment-highlight {
    background: var(--highlight);
    cursor: pointer;
    border-radius: 2px;
    position: relative;
    transition: background 0.15s;
  }
  .comment-highlight:hover { background: var(--highlight-hover); }
  .comment-highlight.resolved { background: rgba(134, 239, 172, 0.25); }

  /* Sidebar */
  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .sidebar-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .sidebar-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--white);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-sub);
    font-family: inherit;
  }
  .filter-chip.active { background: var(--text); color: var(--white); border-color: var(--text); }

  .comment-list { flex: 1; overflow-y: auto; }
  .comment-card {
    background: var(--comment-bg);
    border: 1px solid var(--comment-border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .comment-card:hover { transform: translateX(-2px); }
  .comment-card.resolved { background: var(--resolved-bg); border-color: var(--resolved-border); }
  .comment-author { font-size: 12px; font-weight: 700; color: var(--text); }
  .comment-time { font-size: 10px; color: var(--text-muted); margin-left: 6px; }
  .comment-selected-text {
    font-size: 11px;
    color: #92400E;
    font-style: italic;
    margin: 6px 0;
    padding: 4px 8px;
    background: rgba(252, 211, 77, 0.2);
    border-radius: 4px;
    max-height: 36px;
    overflow: hidden;
  }
  .comment-card.resolved .comment-selected-text { color: #166534; background: rgba(134, 239, 172, 0.15); }
  .comment-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .comment-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 8px;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .status-open { background: #FEF3C7; color: #92400E; }
  .status-resolved { background: #DCFCE7; color: #166534; }

  .resolve-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: #16A34A;
    float: right;
    margin-top: 6px;
    font-family: inherit;
  }
  .resolve-btn:hover { background: #F0FDF4; }

  .reply-section { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.06); }
  .reply-text { font-size: 12px; color: var(--text-sub); }
  .reply-author { font-size: 11px; font-weight: 600; color: #166534; }

  /* Empty state */
  .empty-comments {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-comments .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
  .empty-comments .title { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
  .empty-comments .sub { font-size: 12px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1A1D23;
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    z-index: 600;
    display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show { display: block; animation: fadeIn 0.2s; }
  .toast.success { background: #166534; }
  .toast.error { background: #991B1B; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 700;
    font-size: 14px;
    color: var(--text-sub);
  }
  .loading-overlay.show { display: flex; }

  /* Responsive */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: fixed; right: -380px; top: 0; height: 100vh; width: 360px; z-index: 200; transition: right 0.3s; box-shadow: -4px 0 24px rgba(0,0,0,0.1); }
    .sidebar.open { right: 0; }
    .main-content { padding: 20px; }
    .toggle-sidebar {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--brand); color: white;
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; box-shadow: var(--shadow);
      z-index: 150; border: none;
    }
  }
  @media (min-width: 901px) {
    .toggle-sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="logo">digiQC</span>
      <span class="review-badge">Under Review</span>
      <span style="font-size:13px;color:var(--text-sub);margin-left:8px">{{STORY_TITLE}}</span>
    </div>
    <div class="top-bar-right">
      <span class="reviewer-name" id="reviewerDisplay"></span>
      <button class="changes-btn" onclick="submitDecision('changes_needed')">Changes Needed</button>
      <button class="approve-btn" onclick="submitDecision('approved')">Approve</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Spec will be injected here -->
    <div class="spec-content" id="specContent">
      {{SPEC_CONTENT}}
    </div>

    <!-- Prototype -->
    <div class="prototype-section">
      <div class="prototype-header">
        <span>Interactive Prototype</span>
        <a href="{{PROTOTYPE_URL}}" target="_blank">Open in new tab</a>
      </div>
      <iframe class="prototype-iframe" src="{{PROTOTYPE_URL}}"></iframe>
    </div>
  </div>

  <!-- Comment Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">Comments</div>
    <div class="sidebar-count" id="commentCount">0 comments</div>
    <div class="sidebar-filter">
      <button class="filter-chip active" onclick="filterComments('all', this)">All</button>
      <button class="filter-chip" onclick="filterComments('open', this)">Open</button>
      <button class="filter-chip" onclick="filterComments('resolved', this)">Resolved</button>
    </div>
    <div class="comment-list" id="commentList">
      <div class="empty-comments">
        <div class="icon">💬</div>
        <div class="title">No comments yet</div>
        <div class="sub">Select text in the spec to add a comment</div>
      </div>
    </div>
  </div>
</div>

<!-- Comment Popup -->
<div class="comment-popup" id="commentPopup">
  <div class="popup-header">Add Comment</div>
  <div class="popup-selected" id="popupSelected"></div>
  <input class="popup-name-input" id="popupName" placeholder="Your name" />
  <textarea class="popup-textarea" id="popupText" rows="3" placeholder="Write your comment..."></textarea>
  <div class="popup-actions">
    <button class="popup-cancel" onclick="hidePopup()">Cancel</button>
    <button class="popup-submit" id="popupSubmit" onclick="submitComment()">Submit</button>
  </div>
</div>

<!-- Mobile sidebar toggle -->
<button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')">💬</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Loading -->
<div class="loading-overlay" id="loading"><span>Saving comment...</span></div>

<script>
  // === CONFIG ===
  const REPO_OWNER = 'digiqc-hq';
  const REPO_NAME = 'userstory-reviews';
  const STORY_FOLDER = '{{STORY_FOLDER}}';
  const COMMENTS_PATH = `reviews/${STORY_FOLDER}/comments.json`;
  const TOKEN = '{{REVIEW_TOKEN}}';

  let comments = [];
  let selectedText = '';
  let selectedRange = null;
  let currentFilter = 'all';

  // === INIT ===
  async function init() {
    // Load saved reviewer name
    const saved = localStorage.getItem('reviewer_name');
    if (saved) {
      document.getElementById('popupName').value = saved;
      document.getElementById('reviewerDisplay').textContent = `Reviewing as: ${saved}`;
    }
    await loadComments();
    setupTextSelection();
  }

  // === LOAD COMMENTS ===
  async function loadComments() {
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${COMMENTS_PATH}`, {
        headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (res.ok) {
        const data = await res.json();
        comments = JSON.parse(atob(data.content));
      } else {
        comments = [];
      }
    } catch (e) {
      comments = [];
    }
    renderComments();
    applyHighlights();
  }

  // === SAVE COMMENTS ===
  async function saveComments() {
    showLoading(true);
    try {
      // Get current file SHA
      let sha = null;
      const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${COMMENTS_PATH}`, {
        headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (getRes.ok) {
        const data = await getRes.json();
        sha = data.sha;
      }

      const body = {
        message: `Update comments for ${STORY_FOLDER}`,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(comments, null, 2)))),
        branch: 'main'
      };
      if (sha) body.sha = sha;

      const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${COMMENTS_PATH}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify(body)
      });

      if (!putRes.ok) throw new Error('Failed to save');
      showToast('Comment saved', 'success');
    } catch (e) {
      showToast('Failed to save comment. Please try again.', 'error');
      console.error(e);
    }
    showLoading(false);
  }

  // === TEXT SELECTION ===
  function setupTextSelection() {
    const spec = document.getElementById('specContent');
    spec.addEventListener('mouseup', (e) => {
      const sel = window.getSelection();
      const text = sel.toString().trim();
      if (text.length > 2) {
        selectedText = text;
        selectedRange = sel.getRangeAt(0);
        showPopup(e.clientX, e.clientY);
      }
    });

    document.addEventListener('mousedown', (e) => {
      const popup = document.getElementById('commentPopup');
      if (!popup.contains(e.target) && popup.classList.contains('visible')) {
        hidePopup();
      }
    });
  }

  function showPopup(x, y) {
    const popup = document.getElementById('commentPopup');
    document.getElementById('popupSelected').textContent = selectedText.substring(0, 120) + (selectedText.length > 120 ? '...' : '');
    document.getElementById('popupText').value = '';

    // Position popup
    const pw = 320;
    const ph = 280;
    let left = Math.min(x, window.innerWidth - pw - 20);
    let top = y + 10;
    if (top + ph > window.innerHeight) top = y - ph - 10;

    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.classList.add('visible');
    document.getElementById('popupText').focus();
  }

  function hidePopup() {
    document.getElementById('commentPopup').classList.remove('visible');
    selectedText = '';
    selectedRange = null;
  }

  // === SUBMIT COMMENT ===
  async function submitComment() {
    const name = document.getElementById('popupName').value.trim();
    const text = document.getElementById('popupText').value.trim();
    if (!name || !text) {
      showToast('Name and comment are required', 'error');
      return;
    }

    localStorage.setItem('reviewer_name', name);
    document.getElementById('reviewerDisplay').textContent = `Reviewing as: ${name}`;

    const comment = {
      id: 'c' + Date.now(),
      selectedText: selectedText.substring(0, 300),
      comment: text,
      author: name,
      createdAt: new Date().toISOString(),
      status: 'open',
      resolvedBy: null,
      resolvedAt: null,
      reply: null
    };

    comments.push(comment);
    hidePopup();
    renderComments();
    applyHighlights();
    await saveComments();
  }

  // === RESOLVE COMMENT ===
  async function resolveComment(id) {
    const name = prompt('Your name (to record who resolved):');
    if (!name) return;

    const c = comments.find(x => x.id === id);
    if (c) {
      c.status = 'resolved';
      c.resolvedBy = name;
      c.resolvedAt = new Date().toISOString();
    }
    renderComments();
    applyHighlights();
    await saveComments();
  }

  // === REPLY TO COMMENT ===
  async function replyToComment(id) {
    const name = prompt('Your name:');
    if (!name) return;
    const reply = prompt('Your reply:');
    if (!reply) return;

    const c = comments.find(x => x.id === id);
    if (c) {
      c.reply = { author: name, text: reply, createdAt: new Date().toISOString() };
    }
    renderComments();
    await saveComments();
  }

  // === RENDER SIDEBAR ===
  function renderComments() {
    const list = document.getElementById('commentList');
    const filtered = currentFilter === 'all' ? comments : comments.filter(c => c.status === currentFilter);

    const openCount = comments.filter(c => c.status === 'open').length;
    const resolvedCount = comments.filter(c => c.status === 'resolved').length;
    document.getElementById('commentCount').textContent = `${comments.length} comments (${openCount} open, ${resolvedCount} resolved)`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-comments"><div class="icon">💬</div><div class="title">${currentFilter === 'all' ? 'No comments yet' : 'No ' + currentFilter + ' comments'}</div><div class="sub">Select text in the spec to add a comment</div></div>`;
      return;
    }

    list.innerHTML = filtered.map(c => {
      const time = new Date(c.createdAt).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      const isResolved = c.status === 'resolved';
      return `<div class="comment-card ${isResolved ? 'resolved' : ''}" onclick="scrollToHighlight('${c.id}')">
        <div><span class="comment-author">${c.author}</span><span class="comment-time">${time}</span></div>
        <div class="comment-selected-text">"${c.selectedText.substring(0, 80)}${c.selectedText.length > 80 ? '...' : ''}"</div>
        <div class="comment-text">${c.comment}</div>
        ${c.reply ? `<div class="reply-section"><div class="reply-author">${c.reply.author} replied:</div><div class="reply-text">${c.reply.text}</div></div>` : ''}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
          <span class="comment-status ${isResolved ? 'status-resolved' : 'status-open'}">${isResolved ? '✓ Resolved' + (c.resolvedBy ? ' by ' + c.resolvedBy : '') : '● Open'}</span>
          ${!isResolved ? `<div style="display:flex;gap:4px"><button class="resolve-btn" onclick="event.stopPropagation();replyToComment('${c.id}')" style="color:var(--text-sub)">Reply</button><button class="resolve-btn" onclick="event.stopPropagation();resolveComment('${c.id}')">Resolve</button></div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function filterComments(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderComments();
  }

  // === HIGHLIGHTS ===
  function applyHighlights() {
    // Remove existing highlights
    document.querySelectorAll('.comment-highlight').forEach(el => {
      const parent = el.parentNode;
      parent.replaceChild(document.createTextNode(el.textContent), el);
      parent.normalize();
    });

    // Apply highlights for each comment
    const spec = document.getElementById('specContent');
    comments.forEach(c => {
      if (c.selectedText) {
        highlightText(spec, c.selectedText, c.id, c.status === 'resolved');
      }
    });
  }

  function highlightText(root, text, commentId, resolved) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    while (walker.nextNode()) {
      const node = walker.currentNode;
      const idx = node.textContent.indexOf(text.substring(0, 60));
      if (idx >= 0) {
        const range = document.createRange();
        range.setStart(node, idx);
        range.setEnd(node, Math.min(idx + text.length, node.textContent.length));
        const span = document.createElement('span');
        span.className = `comment-highlight ${resolved ? 'resolved' : ''}`;
        span.dataset.commentId = commentId;
        span.onclick = () => scrollToComment(commentId);
        range.surroundContents(span);
        break;
      }
    }
  }

  function scrollToComment(id) {
    const card = document.querySelector(`.comment-card[onclick*="${id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function scrollToHighlight(id) {
    const hl = document.querySelector(`[data-comment-id="${id}"]`);
    if (hl) hl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // === DECISION ===
  async function submitDecision(decision) {
    const name = document.getElementById('popupName').value.trim() || localStorage.getItem('reviewer_name') || '';
    if (!name) {
      showToast('Please enter your name first (in the comment form)', 'error');
      return;
    }

    const meta = {
      decision: decision,
      reviewer: name,
      timestamp: new Date().toISOString(),
      openComments: comments.filter(c => c.status === 'open').length,
      totalComments: comments.length
    };

    // Save decision to a separate file
    const path = `reviews/${STORY_FOLDER}/decision.json`;
    try {
      let sha = null;
      const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
        headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (getRes.ok) { sha = (await getRes.json()).sha; }

      const body = { message: `Review decision: ${decision} by ${name}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(meta, null, 2)))), branch: 'main' };
      if (sha) body.sha = sha;

      await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      showToast(decision === 'approved' ? '✓ Story approved!' : 'Changes requested — author will be notified', 'success');
    } catch (e) {
      showToast('Failed to save decision', 'error');
    }
  }

  // === UTILS ===
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
  }

  // === GO ===
  init();
</script>
</body>
</html>
